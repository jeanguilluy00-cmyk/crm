<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM — Mes listes</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style id="sharedStyle"></style>
  <style>
    .list-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 28px; }
    .list-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.15s; }
    .list-card:hover { border-color: var(--primary); box-shadow: 0 4px 16px rgba(79,70,229,0.1); }
    .list-card-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; }
    .list-card-meta { font-size: 13px; color: var(--muted); }
    .list-card-actions { display: flex; gap: 8px; margin-top: 16px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .back-btn { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--muted); cursor: pointer; margin-bottom: 16px; }
    .back-btn:hover { color: var(--text); }
  </style>
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Mes listes</span>
      <button class="notif-btn" onclick="window.location.href='relances.html'">🔔 <span class="notif-badge hidden" id="notifCount">0</span></button>
    </div>
    <div class="content">
      <div id="alertBox" class="alert hidden"></div>

      <!-- Vue liste des listes -->
      <div id="listsView">
        <div class="page-header">
          <h2 style="font-size:20px;font-weight:700;">Toutes les listes</h2>
          <button class="btn btn-primary" onclick="openCreateModal()">+ Nouvelle liste</button>
        </div>
        <div id="listsGrid" class="list-grid">
          <div style="grid-column:1/-1;text-align:center;padding:60px;color:#94A3B8;">Chargement...</div>
        </div>
      </div>

      <!-- Vue détail d'une liste -->
      <div id="listDetailView" class="hidden">
        <div class="back-btn" onclick="backToLists()">← Retour aux listes</div>
        <div class="page-header">
          <h2 style="font-size:20px;font-weight:700;" id="listDetailTitle">Ma liste</h2>
          <div class="actions">
            <input type="text" id="listSearchInput" placeholder="Rechercher un contact..." style="width:220px;" oninput="filterListContacts()">
            <button class="btn btn-primary" onclick="openAddContactModal()">+ Ajouter contacts</button>
          </div>
        </div>
        <div class="card">
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Nom</th><th>Poste</th><th>Entreprise</th><th>Email</th><th>Téléphone</th><th>Attribué à</th><th>Actions</th></tr>
              </thead>
              <tbody id="listContactsTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal créer liste -->
  <div id="createModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Créer une nouvelle liste</span>
        <button class="modal-close" onclick="closeModal('createModal')">✕</button>
      </div>
      <div class="form-group">
        <label>Nom de la liste</label>
        <input type="text" id="listName" placeholder="Ex: Directeurs RH - Mars 2026">
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
        <button class="btn btn-secondary" onclick="closeModal('createModal')">Annuler</button>
        <button class="btn btn-primary" onclick="createList()">Créer</button>
      </div>
    </div>
  </div>

  <!-- Modal attribuer client -->
  <div id="assignModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Attribuer à un client</span>
        <button class="modal-close" onclick="closeModal('assignModal')">✕</button>
      </div>
      <div class="form-group">
        <label>Nom du client</label>
        <input type="text" id="clientName" placeholder="Ex: Société ABC">
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
        <button class="btn btn-secondary" onclick="closeModal('assignModal')">Annuler</button>
        <button class="btn btn-primary" onclick="assignToClient()">Attribuer</button>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('sharedStyle').textContent = sharedCSS
    let currentListId = null
    let listContactsData = []
    let currentListContactId = null

    function closeModal(id) { document.getElementById(id).classList.add('hidden') }
    function openCreateModal() { document.getElementById('createModal').classList.remove('hidden') }
    function showAlert(msg, type='error') {
      const box = document.getElementById('alertBox')
      box.textContent = msg; box.className = `alert alert-${type}`; box.classList.remove('hidden')
      setTimeout(() => box.classList.add('hidden'), 4000)
    }

    async function loadLists() {
      const { data } = await supabase.from('lists').select('*, profiles(full_name), list_contacts(id)').order('created_at', { ascending: false })
      const grid = document.getElementById('listsGrid')
      if (!data || !data.length) {
        grid.innerHTML = `<div style="grid-column:1/-1;"><div class="empty-state"><div class="empty-icon">📋</div><p>Aucune liste créée. Créez votre première liste !</p></div></div>`
        return
      }
      grid.innerHTML = data.map(l => `
        <div class="list-card" onclick="openList('${l.id}', '${l.name.replace(/'/g, "\\'")}')">
          <div class="list-card-title">📋 ${l.name}</div>
          <div class="list-card-meta">${l.list_contacts?.length || 0} contact(s) · Créée par ${l.profiles?.full_name || '—'}</div>
          <div class="list-card-meta" style="margin-top:4px;">${new Date(l.created_at).toLocaleDateString('fr-FR')}</div>
          <div class="list-card-actions" onclick="event.stopPropagation()">
            <button class="btn btn-secondary btn-sm" onclick="openList('${l.id}', '${l.name.replace(/'/g, "\\'")}')">Ouvrir</button>
            <button class="btn btn-danger btn-sm" onclick="deleteList('${l.id}')">Supprimer</button>
          </div>
        </div>`).join('')
    }

    async function createList() {
      const name = document.getElementById('listName').value.trim()
      if (!name) return showAlert('Entrez un nom de liste')
      const session = await getSession()
      const profile = await getProfile(session.user.id)
      const { error } = await supabase.from('lists').insert({ name, created_by: session.user.id })
      if (error) return showAlert('Erreur lors de la création')
      await supabase.from('tasks').insert({ done_by: session.user.id, action: `Création de la liste "${name}"` })
      closeModal('createModal')
      document.getElementById('listName').value = ''
      showAlert('Liste créée !', 'success')
      loadLists()
    }

    async function deleteList(id) {
      if (!confirm('Supprimer cette liste ?')) return
      await supabase.from('lists').delete().eq('id', id)
      showAlert('Liste supprimée', 'success')
      loadLists()
    }

    async function openList(id, name) {
      currentListId = id
      document.getElementById('listDetailTitle').textContent = name
      document.getElementById('listsView').classList.add('hidden')
      document.getElementById('listDetailView').classList.remove('hidden')
      loadListContacts()
    }

    function backToLists() {
      document.getElementById('listDetailView').classList.add('hidden')
      document.getElementById('listsView').classList.remove('hidden')
      currentListId = null
    }

    async function loadListContacts() {
      const { data } = await supabase
        .from('list_contacts')
        .select('*, contacts(*)')
        .eq('list_id', currentListId)
      listContactsData = data || []
      renderListContacts(listContactsData)
    }

    function renderListContacts(items) {
      const tbody = document.getElementById('listContactsTable')
      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👥</div><p>Aucun contact dans cette liste</p></div></td></tr>`
        return
      }
      tbody.innerHTML = items.map(lc => `
        <tr>
          <td><strong>${lc.contacts?.first_name || ''} ${lc.contacts?.last_name || ''}</strong></td>
          <td>${lc.contacts?.position || '—'}</td>
          <td>${lc.contacts?.company || '—'}</td>
          <td>${lc.contacts?.email || '—'}</td>
          <td>${lc.contacts?.phone_1 || '—'}</td>
          <td>${lc.assigned_to_client ? `<span class="badge badge-pending">${lc.assigned_to_client}</span>` : '<span style="color:#94A3B8;font-size:12px;">Non attribué</span>'}</td>
          <td>
            <button class="btn btn-secondary btn-sm" onclick="openAssignModal('${lc.id}')">Attribuer</button>
            <button class="btn btn-danger btn-sm" style="margin-left:6px;" onclick="removeFromList('${lc.id}')">✕</button>
          </td>
        </tr>`).join('')
    }

    function filterListContacts() {
      const q = document.getElementById('listSearchInput').value.toLowerCase()
      const filtered = listContactsData.filter(lc =>
        [lc.contacts?.first_name, lc.contacts?.last_name, lc.contacts?.company, lc.contacts?.email].some(v => v && v.toLowerCase().includes(q))
      )
      renderListContacts(filtered)
    }

    function openAssignModal(listContactId) {
      currentListContactId = listContactId
      document.getElementById('assignModal').classList.remove('hidden')
    }

    async function assignToClient() {
      const client = document.getElementById('clientName').value.trim()
      if (!client) return showAlert('Entrez un nom de client')
      await supabase.from('list_contacts').update({ assigned_to_client: client, assigned_at: new Date().toISOString() }).eq('id', currentListContactId)
      const session = await getSession()
      await supabase.from('tasks').insert({ done_by: session.user.id, action: `Contact attribué au client "${client}"` })
      closeModal('assignModal')
      document.getElementById('clientName').value = ''
      showAlert('Attribué !', 'success')
      loadListContacts()
    }

    async function removeFromList(id) {
      if (!confirm('Retirer ce contact de la liste ?')) return
      await supabase.from('list_contacts').delete().eq('id', id)
      loadListContacts()
    }

    async function openAddContactModal() {
      const { data: contacts } = await supabase.from('contacts').select('id, first_name, last_name, company').order('last_name')
      const existing = listContactsData.map(lc => lc.contacts?.id)
      const available = (contacts || []).filter(c => !existing.includes(c.id))

      const modal = document.createElement('div')
      modal.className = 'modal-overlay'
      modal.id = 'addContactModal'
      modal.innerHTML = `
        <div class="modal" style="max-width:500px;">
          <div class="modal-header">
            <span class="modal-title">Ajouter des contacts</span>
            <button class="modal-close" onclick="document.getElementById('addContactModal').remove()">✕</button>
          </div>
          <input type="text" placeholder="Rechercher..." oninput="filterAddList(this.value)" style="margin-bottom:12px;">
          <div id="addContactList" style="max-height:320px;overflow-y:auto;">
            ${available.map(c => `
              <label style="display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid #E2E8F0;cursor:pointer;">
                <input type="checkbox" value="${c.id}" style="width:auto;">
                <span style="font-size:14px;">${c.first_name || ''} ${c.last_name || ''} <span style="color:#94A3B8;">— ${c.company || ''}</span></span>
              </label>`).join('')}
          </div>
          <div style="display:flex;justify-content:flex-end;margin-top:16px;gap:10px;">
            <button class="btn btn-secondary" onclick="document.getElementById('addContactModal').remove()">Annuler</button>
            <button class="btn btn-primary" onclick="confirmAddContacts()">Ajouter</button>
          </div>
        </div>`
      document.body.appendChild(modal)
    }

    function filterAddList(q) {
      document.querySelectorAll('#addContactList label').forEach(el => {
        el.style.display = el.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none'
      })
    }

    async function confirmAddContacts() {
      const checked = [...document.querySelectorAll('#addContactList input:checked')].map(cb => cb.value)
      if (!checked.length) return
      const rows = checked.map(id => ({ list_id: currentListId, contact_id: id }))
      await supabase.from('list_contacts').insert(rows)
      const session = await getSession()
      await supabase.from('tasks').insert({ done_by: session.user.id, action: `${checked.length} contact(s) ajouté(s) à la liste` })
      document.getElementById('addContactModal')?.remove()
      showAlert(`${checked.length} contact(s) ajouté(s) !`, 'success')
      loadListContacts()
    }

    async function init() {
      const auth = await requireAuth(['admin', 'consultant'])
      if (!auth) return
      const { session, profile } = auth
      document.getElementById('sidebarContainer').innerHTML = renderSidebar(profile, 'lists')
      const notifs = await loadNotifications(session.user.id)
      if (notifs.length > 0) { document.getElementById('notifCount').textContent = notifs.length; document.getElementById('notifCount').classList.remove('hidden') }
      loadLists()
    }
    init()
  </script>
</body>
</html>
