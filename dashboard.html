<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM — Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style id="sharedStyle"></style>
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 20px; }
    .stat-icon { font-size: 24px; margin-bottom: 10px; }
    .stat-value { font-size: 32px; font-weight: 700; color: var(--text); }
    .stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .activity-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; background: #EDE9FE; }
    .activity-text { font-size: 14px; }
    .activity-time { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .relance-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .relance-item:last-child { border-bottom: none; }
    .relance-name { font-size: 14px; font-weight: 500; }
    .relance-sub { font-size: 12px; color: var(--muted); }
    .relance-days { font-size: 12px; font-weight: 600; color: var(--danger); }
  </style>
</head>
<body>
  <div id="sidebarContainer"></div>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">Dashboard</span>
      <button class="notif-btn" onclick="window.location.href='relances.html'">
        🔔 <span class="notif-badge hidden" id="notifCount">0</span>
      </button>
    </div>
    <div class="content">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-value" id="statContacts">—</div><div class="stat-label">Contacts total</div></div>
        <div class="stat-card"><div class="stat-icon">📋</div><div class="stat-value" id="statLists">—</div><div class="stat-label">Listes créées</div></div>
        <div class="stat-card"><div class="stat-icon">✉️</div><div class="stat-value" id="statPending">—</div><div class="stat-label">Emails en attente</div></div>
        <div class="stat-card"><div class="stat-icon">🔔</div><div class="stat-value" id="statRelances">—</div><div class="stat-label">À relancer</div></div>
      </div>
      <div class="bottom-grid">
        <div class="card">
          <div class="card-title">Activité récente</div>
          <div id="activityFeed"><div style="color:#94A3B8;font-size:14px;">Chargement...</div></div>
        </div>
        <div class="card">
          <div class="card-title">Relances urgentes</div>
          <div id="relancesFeed"><div style="color:#94A3B8;font-size:14px;">Chargement...</div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('sharedStyle').textContent = sharedCSS

    async function init() {
      const auth = await requireAuth()
      if (!auth) return
      const { session, profile } = auth

      document.getElementById('sidebarContainer').innerHTML = renderSidebar(profile, 'dashboard')

      // Notifications
      const notifs = await loadNotifications(session.user.id)
      if (notifs.length > 0) {
        document.getElementById('notifCount').textContent = notifs.length
        document.getElementById('notifCount').classList.remove('hidden')
      }

      // Stats
      const [{ count: cContacts }, { count: cLists }, { count: cPending }, { count: cRelances }] = await Promise.all([
        supabase.from('contacts').select('*', { count: 'exact', head: true }),
        supabase.from('lists').select('*', { count: 'exact', head: true }),
        supabase.from('email_requests').select('*', { count: 'exact', head: true }).eq('status', 'pending'),
        supabase.from('notifications').select('*', { count: 'exact', head: true }).eq('user_id', session.user.id).eq('is_read', false).lte('scheduled_for', new Date().toISOString()),
      ])
      document.getElementById('statContacts').textContent = cContacts || 0
      document.getElementById('statLists').textContent = cLists || 0
      document.getElementById('statPending').textContent = cPending || 0
      document.getElementById('statRelances').textContent = cRelances || 0

      // Activity feed
      const { data: tasks } = await supabase.from('tasks').select('*, profiles(full_name)').order('done_at', { ascending: false }).limit(6)
      const feed = document.getElementById('activityFeed')
      if (!tasks || tasks.length === 0) {
        feed.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><p>Aucune activité récente</p></div>'
      } else {
        feed.innerHTML = tasks.map(t => `
          <div class="activity-item">
            <div class="activity-icon">📝</div>
            <div>
              <div class="activity-text">${t.action}</div>
              <div class="activity-time">${t.profiles?.full_name || 'Système'} · ${new Date(t.done_at).toLocaleDateString('fr-FR', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' })}</div>
            </div>
          </div>`).join('')
      }

      // Relances urgentes
      const now = new Date().toISOString()
      const { data: relances } = await supabase
        .from('email_requests')
        .select('*, contacts(first_name, last_name, company)')
        .eq('status', 'sent')
        .lte('sent_at', new Date(Date.now() - 6 * 24 * 60 * 60 * 1000).toISOString())
        .order('sent_at', { ascending: true })
        .limit(5)
      const rfeed = document.getElementById('relancesFeed')
      if (!relances || relances.length === 0) {
        rfeed.innerHTML = '<div class="empty-state"><div class="empty-icon">✅</div><p>Aucune relance urgente</p></div>'
      } else {
        rfeed.innerHTML = relances.map(r => {
          const days = Math.floor((Date.now() - new Date(r.sent_at)) / (1000 * 60 * 60 * 24))
          return `<div class="relance-item">
            <div>
              <div class="relance-name">${r.contacts?.first_name || ''} ${r.contacts?.last_name || ''}</div>
              <div class="relance-sub">${r.contacts?.company || ''}</div>
            </div>
            <div class="relance-days">J+${days}</div>
          </div>`
        }).join('')
      }
    }
    init()
  </script>
</body>
</html>
